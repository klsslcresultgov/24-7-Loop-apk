name: Build Mobile App APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create loopapp com.twentyfourseven.loop "24/7 Loop"
        cd loopapp
        cordova platform add android --no-telemetry

    - name: Copy Website Code to Cordova
      run: |
        rm -rf loopapp/www/*
        if [ -f "index.html" ]; then
          cp index.html loopapp/www/
        elif [ -f "Index.html" ]; then
          cp Index.html loopapp/www/index.html
        else
          echo "ERROR: index.html ഫയൽ കണ്ടെത്താൻ കഴിഞ്ഞില്ല!"
          exit 1
        fi

    - name: Set App Icon
      run: |
        if [ -f "logo.png" ]; then
          cp logo.png loopapp/www/icon.png
          sed -i '/<\/widget>/i \    <icon src="www/icon.png" />' loopapp/config.xml
        elif [ -f "Logo.png" ]; then
          cp Logo.png loopapp/www/icon.png
          sed -i '/<\/widget>/i \    <icon src="www/icon.png" />' loopapp/config.xml
        fi

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Android APK
      run: |
        cd loopapp
        cordova build android --release

    # ബിൽഡ് ചെയ്ത APK ഫയൽ എളുപ്പത്തിൽ കിട്ടാൻ വേണ്ടി മെയിൻ റൂട്ടിലേക്ക് കോപ്പി ചെയ്യുന്നു
    - name: Copy APK to Root
      run: |
        mkdir -p output-apk
        find loopapp/platforms/android/ -name "*.apk" -exec cp {} output-apk/ \;

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 247-Loop-APK
        path: output-apk/
