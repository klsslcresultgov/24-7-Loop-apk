name: Build Mobile App APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # ഇവിടെ നമ്മൾ @capacitor/android കൂടി ചേർത്ത് ഇൻസ്റ്റാൾ ചെയ്യുന്നു
    - name: Install Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor Project
      run: |
        mkdir -p www
        if [ -f "index.html" ]; then
          cp index.html www/
        elif [ -f "Index.html" ]; then
          cp Index.html www/index.html
        else
          echo "<h1>24/7 Loop</h1>" > www/index.html
        fi
        npx cap init "24/7 Loop" "com.twentyfourseven.loop" --web-dir=www
        npx cap add android

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Android App with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Copy APK to Output Folder
      run: |
        mkdir -p output-apk
        cp android/app/build/outputs/apk/debug/app-debug.apk output-apk/247-Loop.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 247-Loop-APK
        path: output-apk/247-Loop.apk
