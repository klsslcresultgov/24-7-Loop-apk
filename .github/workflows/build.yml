name: Build Mobile App APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4  # v4 ലേക്ക് അപ്ഡേറ്റ് ചെയ്തു

    - name: Set up Node.js
      uses: actions/setup-node@v4  # v4 ലേക്ക് അപ്ഡേറ്റ് ചെയ്തു
      with:
        node-version: 18

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create loopapp com.twentyfourseven.loop "24/7 Loop"
        cd loopapp
        cordova platform add android --no-telemetry

    - name: Copy Website Code to Cordova
      run: |
        rm -rf loopapp/www/*
        cp index.html loopapp/www/

    - name: Set App Icon
      run: |
        if [ -f "logo.png" ]; then
          cp logo.png loopapp/www/icon.png
          sed -i '/<\/widget>/i \    <icon src="www/icon.png" />' loopapp/config.xml
        fi

    - name: Setup Java JDK
      uses: actions/setup-java@v4  # v4 ലേക്ക് അപ്ഡേറ്റ് ചെയ്തു
      with:
        distribution: 'temurin'
        java-version: '17'  # പുതിയ ആൻഡ്രോയിഡ് ബിൽഡിന് അനുയോജ്യമായ ജാവ വേർഷൻ

    - name: Build Android APK
      run: |
        cd loopapp
        cordova build android --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4  # എറർ വന്നിരുന്ന ഭാഗം ഇവിടെ v4 ആക്കി മാറ്റി
      with:
        name: 247-Loop-APK
        path: loopapp/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
