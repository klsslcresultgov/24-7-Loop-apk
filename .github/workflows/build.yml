name: Build Mobile App APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

      - name: Create Web Directory
        run: |
          mkdir -p www

          if [ -f "index.html" ]; then
            cp index.html www/index.html
          elif [ -f "Index.html" ]; then
            cp Index.html www/index.html
          else
            echo "<!DOCTYPE html><html><body><h1>Cafe Bill</h1></body></html>" > www/index.html
          fi

      - name: Initialize Capacitor
        run: |
          npx cap init "Cafe Bill" "com.risham.cafebill" --web-dir=www
          npx cap add android

      - name: Generate App Icon
        run: |
          if [ -f "logo.png" ]; then
            npm install -g @capacitor/assets
            mkdir -p assets

            cp logo.png assets/icon-only.png
            cp logo.png assets/icon-foreground.png
            cp logo.png assets/icon-background.png
            cp logo.png assets/splash.png
            cp logo.png assets/splash-dark.png

            npx capacitor-assets generate --android
          else
            echo "logo.png not found. Skipping icon generation."
          fi

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Copy APK
        run: |
          mkdir -p output-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk output-apk/Cafe-Bill.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Cafe-Bill-APK
          path: output-apk/Cafe-Bill.apk
