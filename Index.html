<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24/7 Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #e50914;
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            padding-bottom: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 10px 0;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--primary-color);
        }

        header p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .movie-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .movie-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease;
            position: relative;
        }

        .movie-card:active {
            transform: scale(0.98);
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 140%;
        }

        .movie-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #ffc107;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .movie-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .movie-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 4px;
            color: var(--text-color);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 36px;
        }

        .movie-category {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .download-btn {
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(229, 9, 20, 0.3);
        }

        .download-btn:active {
            background-color: #b20710;
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            padding: 40px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>24/7 <span>Loop</span></h1>
        <p>അൺലിമിറ്റഡ് മൂവി ഡൗൺലോഡ്സ് ഒറ്റ ക്ലിക്കിൽ</p>
    </header>

    <div class="movie-container" id="movie-list">
        <div class="status-msg">സിനിമകൾ ലോഡ് ചെയ്യുന്നു...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // നിങ്ങളുടെ ഫയർബേസ് വിവരങ്ങൾ
        const firebaseConfig = {
            apiKey: "AIzaSyAthFMO8zGT5BtiOkh4zkc71jL06LR_F9c",
            authDomain: "a-one-chat-19ad6.firebaseapp.com",
            databaseURL: "https://a-one-chat-19ad6-default-rtdb.firebaseio.com",
            projectId: "a-one-chat-19ad6",
            storageBucket: "a-one-chat-19ad6.firebasestorage.app",
            messagingSenderId: "691783470864",
            appId: "1:691783470864:web:b89626457a5eb73d6e5f95",
            measurementId: "G-MZW3935G6Z"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const movieListContainer = document.getElementById('movie-list');

        database.ref('movies').on('value', (snapshot) => {
            movieListContainer.innerHTML = ''; 
            const movies = snapshot.val();

            if (movies) {
                Object.keys(movies).forEach((key) => {
                    const movie = movies[key];
                    
                    const movieCard = document.createElement('div');
                    movieCard.className = 'movie-card';

                    const rating = movie.rating || "4.5";
                    const category = movie.category || "Movie | Action";

                    movieCard.innerHTML = `
                        <div class="image-wrapper">
                            <img src="${movie.image}" alt="${movie.title}" loading="lazy">
                            <div class="rating-badge">★ ${rating}</div>
                        </div>
                        <div class="movie-info">
                            <div>
                                <div class="movie-title">${movie.title}</div>
                                <div class="movie-category">${category}</div>
                            </div>
                            <a href="${movie.downloadUrl}" target="_blank" class="download-btn">ഡൗൺലോഡ്</a>
                        </div>
                    `;

                    movieListContainer.appendChild(movieCard);
                });
            } else {
                movieListContainer.innerHTML = '<div class="status-msg">സിനിമകൾ ഒന്നും ലഭ്യമാക്കിയിട്ടില്ല!</div>';
            }
        }, (error) => {
            movieListContainer.innerHTML = '<div class="status-msg">ഡാറ്റ ലോഡ് ചെയ്യുന്നതിൽ പരാജയപ്പെട്ടു.</div>';
        });
    </script>
</body>
</html>
