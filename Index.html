<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24/7 Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #e50914;
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --input-bg: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            padding-bottom: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px 0;
            position: relative;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--primary-color);
        }

        header p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .admin-trigger {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            color: #333;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }

        /* Search Box Styles */
        .search-container {
            max-width: 500px;
            margin: 0 auto 25px auto;
            padding: 0 10px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.2);
        }

        /* Hero Banner Styles */
        .hero-banner {
            display: none;
            max-width: 1200px;
            margin: 0 auto 30px auto;
            height: 350px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .hero-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(15,15,15,1) 10%, rgba(15,15,15,0.6) 50%, rgba(0,0,0,0.1) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
        }

        .hero-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .hero-meta {
            font-size: 13px;
            color: #ffc107;
            margin-bottom: 15px;
            font-weight: 600;
            }

        .hero-btn {
            align-self: flex-start;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
        }

        /* Movie Grid */
        .section-title {
            max-width: 1200px;
            margin: 0 auto 15px auto;
            font-size: 18px;
            font-weight: 600;
            padding-left: 5px;
            border-left: 4px solid var(--primary-color);
        }

        .movie-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .movie-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease;
            position: relative;
        }

        .movie-card:active {
            transform: scale(0.98);
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 140%;
        }

        .movie-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #ffc107;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .movie-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .movie-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 4px;
            color: var(--text-color);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 36px;
        }

        .movie-category {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .download-btn {
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            padding: 40px 0;
        }

        /* Admin Panel Form */
        .admin-panel {
            display: none;
            max-width: 500px;
            margin: 20px auto;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--primary-color);
            box-shadow: 0 10px 25px rgba(229, 9, 20, 0.2);
        }

        .admin-panel h2 {
            margin-bottom: 15px;
            font-size: 20px;
            color: var(--primary-color);
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            background: #252525;
            padding: 10px;
            border-radius: 8px;
        }

        .checkbox-group input {
            width: auto;
            transform: scale(1.3);
            cursor: pointer;
        }

        .checkbox-group label {
            display: inline;
            color: #ffc107;
            font-weight: 600;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .hero-banner { height: 220px; }
            .hero-title { font-size: 20px; }
            .hero-btn { padding: 8px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>24/7 <span>Loop</span></h1>
        <p>Unlimited Movie Downloads In One Click</p>
        <button class="admin-trigger" onclick="checkAdminPassword()">⚫</button>
    </header>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-input" placeholder="Search movies by name..." oninput="searchMovies()">
    </div>

    <div class="admin-panel" id="adminConsole">
        <h2>Admin Movie Uploader</h2>
        <div class="form-group">
            <label>Movie Title</label>
            <input type="text" id="movieTitle" placeholder="Eg: Aavesham">
        </div>
        <div class="form-group">
            <label>Category</label>
            <input type="text" id="movieCat" placeholder="Eg: Action | Comedy">
        </div>
        <div class="form-group">
            <label>Rating</label>
            <input type="text" id="movieRating" placeholder="Eg: 4.8">
        </div>
        <div class="form-group">
            <label>Poster Image URL</label>
            <input type="text" id="movieImg" placeholder="https://i.postimg.cc/...">
        </div>
        <div class="form-group">
            <label>Download URL</label>
            <input type="text" id="movieLink" placeholder="Drive / Terabox Link">
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="isHeroBanner">
            <label for="isHeroBanner">Make this Hero Banner (Top Banner)</label>
        </div>
        
        <button class="submit-btn" onclick="uploadMovie()">Upload Movie</button>
    </div>

    <div class="hero-banner" id="heroSection"></div>

    <div class="section-title">Latest Movies</div>

    <div class="movie-container" id="movie-list">
        <div class="status-msg">Loading Movies...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAthFMO8zGT5BtiOkh4zkc71jL06LR_F9c",
            authDomain: "a-one-chat-19ad6.firebaseapp.com",
            databaseURL: "https://a-one-chat-19ad6-default-rtdb.firebaseio.com",
            projectId: "a-one-chat-19ad6",
            storageBucket: "a-one-chat-19ad6.firebasestorage.app",
            messagingSenderId: "691783470864",
            appId: "1:691783470864:web:b89626457a5eb73d6e5f95",
            measurementId: "G-MZW3935G6Z"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let allMovies = [];

        database.ref('movies').on('value', (snapshot) => {
            const moviesData = snapshot.val();
            allMovies = [];
            let heroMovie = null;

            if (moviesData) {
                Object.keys(moviesData).forEach((key) => {
                    const m = moviesData[key];
                    m.id = key;
                    allMovies.push(m);
                    
                    if (m.isHero === true) {
                        heroMovie = m;
                    }
                });
                
                allMovies.reverse(); 
                renderHeroBanner(heroMovie);
                displayMovies(allMovies);
            } else {
                document.getElementById('movie-list').innerHTML = '<div class="status-msg">No movies available!</div>';
            }
        });

        function renderHeroBanner(movie) {
            const heroSection = document.getElementById('heroSection');
            if (movie) {
                heroSection.style.display = 'block';
                heroSection.innerHTML = `
                    <img src="${movie.image}" class="hero-bg" alt="Hero Poster">
                    <div class="hero-overlay">
                        <div class="hero-title">${movie.title}</div>
                        <div class="hero-meta">★ ${movie.rating || '4.5'} | ${movie.category || 'Featured'}</div>
                        <a href="${movie.downloadUrl}" target="_blank" class="hero-btn">Download Now</a>
                    </div>
                `;
            } else {
                heroSection.style.display = 'none';
            }
        }

        function displayMovies(moviesList) {
            const movieListContainer = document.getElementById('movie-list');
            movieListContainer.innerHTML = '';

            if (moviesList.length === 0) {
                movieListContainer.innerHTML = '<div class="status-msg">No movies found!</div>';
                return;
            }

            moviesList.forEach((movie) => {
                const movieCard = document.createElement('div');
                movieCard.className = 'movie-card';
                movieCard.innerHTML = `
                    <div class="image-wrapper">
                        <img src="${movie.image}" alt="${movie.title}" loading="lazy">
                        <div class="rating-badge">★ ${movie.rating || '4.5'}</div>
                    </div>
                    <div class="movie-info">
                        <div>
                            <div class="movie-title">${movie.title}</div>
                            <div class="movie-category">${movie.category || 'Movie'}</div>
                        </div>
                        <a href="${movie.downloadUrl}" target="_blank" class="download-btn">Download</a>
                    </div>
                `;
                movieListContainer.appendChild(movieCard);
            });
        }

        function searchMovies() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            const filtered = allMovies.filter(movie => movie.title.toLowerCase().includes(query));
            displayMovies(filtered);
        }

        function checkAdminPassword() {
            const password = prompt("Enter Admin Password:");
            if (password === "123") {
                alert("Login successful!");
                document.getElementById('adminConsole').style.display = 'block';
                window.scrollTo(0, 0);
            } else if (password !== null) {
                alert("Incorrect password!");
            }
        }

        function uploadMovie() {
            const title = document.getElementById('movieTitle').value;
            const category = document.getElementById('movieCat').value;
            const rating = document.getElementById('movieRating').value;
            const image = document.getElementById('movieImg').value;
            const downloadUrl = document.getElementById('movieLink').value;
            const isHero = document.getElementById('isHeroBanner').checked;

            if (!title || !image || !downloadUrl) {
                alert("Please fill in all required fields!");
                return;
            }

            if (isHero) {
                database.ref('movies').once('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        Object.keys(data).forEach((key) => {
                            if (data[key].isHero) {
                                database.ref(`movies/${key}/isHero`).set(false);
                            }
                        });
                    }
                    saveToFirebase(title, category, rating, image, downloadUrl, true);
                });
            } else {
                saveToFirebase(title, category, rating, image, downloadUrl, false);
            }
        }

        function saveToFirebase(title, category, rating, image, downloadUrl, isHeroValue) {
            const newMovieRef = database.ref('movies').push();
            newMovieRef.set({
                title: title,
                category: category || "Movie",
                rating: rating || "4.5",
                image: image,
                downloadUrl: downloadUrl,
                isHero: isHeroValue,
                timestamp: Date.now()
            }).then(() => {
                alert("Movie uploaded successfully!");
                document.getElementById('movieTitle').value = '';
                document.getElementById('movieCat').value = '';
                document.getElementById('movieRating').value = '';
                document.getElementById('movieImg').value = '';
                document.getElementById('movieLink').value = '';
                document.getElementById('isHeroBanner').checked = false;
            });
        }
    </script>
</body>
</html>
